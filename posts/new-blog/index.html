<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEW BLOG! — lostwaltz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    :root {
      --bg:  #0c0c0f;
      --s1:  #131316;
      --s2:  #18181d;
      --bd:  #222228;
      --bd2: #2e2e38;
      --tx:  #e2e2e8;
      --mu:  #6e6e82;
      --mu2: #9898b0;
      --ac:  #8b7cf8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 0 24px;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────────── */
    header {
      padding: 36px 0 32px;
    }

    .back {
      font-size: 12px;
      color: var(--mu2);
      text-decoration: none;
      letter-spacing: .5px;
      transition: color .15s;
    }
    .back:hover { color: var(--ac); }

    /* ── POST HEADER ────────────────────── */
    .post-header {
      padding: 32px 0 28px;
      border-bottom: 1px solid var(--bd);
      margin-bottom: 40px;
    }

    .post-title {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: .5px;
      line-height: 1.3;
      color: var(--tx);
      margin-bottom: 16px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .post-date {
      font-size: 12px;
      color: var(--mu);
      font-variant-numeric: tabular-nums;
    }

    .post-read {
      font-size: 12px;
      color: var(--mu);
    }

    .tag {
      font-size: 10px;
      color: var(--mu2);
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 4px;
      padding: 1px 7px;
    }

    /* ── POST BODY ──────────────────────── */
    .post-body {
      line-height: 1.8;
      font-size: 15px;
      color: var(--tx);
      padding-bottom: 64px;
    }

    .post-body h1,
    .post-body h2,
    .post-body h3 {
      font-weight: 400;
      color: var(--tx);
      margin: 2em 0 .75em;
      line-height: 1.3;
    }
    .post-body h1 { font-size: 22px; }
    .post-body h2 { font-size: 19px; border-bottom: 1px solid var(--bd); padding-bottom: 8px; }
    .post-body h3 { font-size: 16px; color: var(--mu2); }

    .post-body p { margin-bottom: 1.25em; }

    .post-body a {
      color: var(--ac);
      text-decoration: none;
      border-bottom: 1px solid rgba(139,124,248,.3);
      transition: border-color .15s;
    }
    .post-body a:hover { border-color: var(--ac); }

    .post-body ul,
    .post-body ol {
      margin: 0 0 1.25em 1.4em;
    }
    .post-body li { margin-bottom: .4em; }

    .post-body blockquote {
      border-left: 3px solid var(--ac);
      padding: 6px 0 6px 18px;
      margin: 1.5em 0;
      color: var(--mu2);
      font-style: italic;
    }

    .post-body hr {
      border: none;
      border-top: 1px solid var(--bd);
      margin: 2em 0;
    }

    .post-body code {
      font-family: 'Consolas', 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--ac);
    }

    .post-body pre {
      background: var(--s1) !important;
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 18px 20px;
      overflow-x: auto;
      margin: 1.5em 0;
    }
    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }

    .post-body img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--bd);
      margin: 1em 0;
    }

    /* ── FOOTER ─────────────────────────── */
    .post-footer {
      border-top: 1px solid var(--bd);
      padding: 24px 0 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-footer a {
      font-size: 12px;
      color: var(--mu2);
      text-decoration: none;
      transition: color .15s;
    }
    .post-footer a:hover { color: var(--ac); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

    @media (max-width: 520px) {
      body { padding: 0 18px; }
      .post-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="back">← lostwaltz</a>
</header>

<main>
  <div class="post-header">
    <h1 class="post-title">NEW BLOG!</h1>
    <div class="post-meta">
      <span class="post-date">2025.07.08</span>
      <span class="post-read">· 1분</span>
      <span class="tag">기타</span>
    </div>
  </div>

  <div class="post-body">
    <p>안녕하세요!</p>
    <p>앞으로 개발 이야기, 공부 기록, 그리고 일상 소소한 이야기들을 이곳에 꾸준히 올릴 예정입니다.</p>
  </div>

  <div class="post-footer">
    <a href="/">← 목록으로</a>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>

</body>
</html>
